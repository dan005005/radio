<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор текстів — Радіо Промінь</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 750px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; background: #eee; cursor: pointer; border: none; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        label { font-weight: bold; display: block; margin: 15px 0 5px; }
        textarea { width: 100%; height: 160px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; resize: vertical; }
        .radio-group { margin: 15px 0; }
        .radio-group label { display: inline-block; margin-right: 20px; font-weight: normal; cursor: pointer; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #27ae60; }
        .results-container { margin-top: 20px; }
        .text-item { background: #eef2f5; border-left: 5px solid #3498db; padding: 15px; margin-bottom: 15px; border-radius: 0 4px 4px 0; position: relative; }
        .text-content { white-space: pre-wrap; font-size: 14px; line-height: 1.5; margin-right: 90px; }
        .copy-btn { position: absolute; top: 15px; right: 15px; width: auto; padding: 6px 12px; font-size: 12px; background: #34495e; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .copy-btn:hover { background: #2c3e50; }
        .error-item { border-left-color: #e74c3c; background: #fde8e7; }
        .alert { padding: 10px; background: #ffeb3b; color: #333; border-radius: 4px; margin-top: 10px; font-size: 14px; display: none; }
        .hint { color: #7f8c8d; font-size: 13px; margin-top: 2px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>📻  Генератор текстів для Радіо Промінь</h2>
    
    <div class="tabs">
        <button class="tab-btn active" id="btn-tab1" onclick="switchTab('songs-tab')">1. Пісні та Ротація</button>
        <button class="tab-btn" id="btn-tab2" onclick="switchTab('labels-tab')">2. Тексти для Лейблів</button>
    </div>

    <!-- ВКЛАДКА 1: ПІСНІ -->
    <div id="songs-tab" class="tab-content active">
        <label for="songs-input">Вставте список пісень:</label>
        <div class="hint">
            <strong>Перший рядок:</strong> загальна дата (наприклад: 22.06)<br>
            <strong>Наступні рядки:</strong> Виконавець - Назва пісні - Час першого ефіру
        </div>
        <textarea id="songs-input" placeholder="22.06&#10;1. Океан Ельзи - Без бою - 14:15&#10;2. Бумбокс - Вахтерам - 10:30"></textarea>
        
        <div class="radio-group">
            <label><input type="radio" name="rotation" value="regular" checked> Звичайна ротація</label>
            <label><input type="radio" name="rotation" value="promin"> Промінь рекомендує</label>
        </div>
        
        <button onclick="generateSongs()">Згенерувати тексти листів</button>
        
        <label>Результати:</label>
        <div id="songs-output-list" class="results-container"></div>
    </div>

    <!-- ВКЛАДКА 2: ЛЕЙБЛИ -->
    <div id="labels-tab" class="tab-content">
        <div id="label-alert" class="alert"></div>
        <label for="labels-input">Вставте список лейблів (по одному в рядку, за порядком пісень):</label>
<textarea id="labels-input" placeholder="Лейбл 1&#10;Лейбл 2"></textarea>
        
        <button onclick="generateLabels()">Згенерувати тексти для лейблів</button>
        
        <label>Результати для лейблів:</label>
        <div id="labels-output-list" class="results-container"></div>
    </div>
</div>

<script>
    var parsedSongs = [];

    function switchTab(tabId) {
        document.getElementById('songs-tab').classList.remove('active');
        document.getElementById('labels-tab').classList.remove('active');
        document.getElementById('btn-tab1').classList.remove('active');
        document.getElementById('btn-tab2').classList.remove('active');
        
        document.getElementById(tabId).classList.add('active');
        if (tabId === 'songs-tab') {
            document.getElementById('btn-tab1').classList.add('active');
        } else {
            document.getElementById('btn-tab2').classList.add('active');
        }

        var alertBox = document.getElementById('label-alert');
        if(tabId === 'labels-tab') {
            if (parsedSongs.length === 0) {
                alertBox.style.display = 'block';
                alertBox.style.background = '#ffeb3b';
                alertBox.style.color = '#333';
                alertBox.innerText = "⚠️ Увага: Спочатку додайте та згенеруйте пісні на першій вкладці!";
            } else {
                alertBox.style.display = 'block';
                alertBox.style.background = '#d4edda';
                alertBox.style.color = '#155724';
                alertBox.innerText = "✅ Знайдено треків для прив'язки лейблів: " + parsedSongs.length + ".";
            }
        }
    }

    function add6Days(dateStr) {
        try {
            var parts = dateStr.trim().split('.');
            if (parts.length < 2) return dateStr + " + 6 днів";
            
            var day = parseInt(parts[0], 10);
            var month = parseInt(parts[1], 10) - 1;
            var year = parts[2] ? parseInt(parts[2], 10) : new Date().getFullYear();
            
            var dateObj = new Date(year, month, day);
            dateObj.setDate(dateObj.getDate() + 6);
            
            var resDay = String(dateObj.getDate());
            if (resDay.length < 2) resDay = '0' + resDay;
            
            var resMonth = String(dateObj.getMonth() + 1);
            if (resMonth.length < 2) resMonth = '0' + resMonth;
            
            return parts[2] ? resDay + "." + resMonth + "." + dateObj.getFullYear() : resDay + "." + resMonth;
        } catch(e) {
            return dateStr + " + 6 днів";
        }
    }

    function parseSongLine(line) {
        var cleanLine = line.replace(/^\d+[\.\)\s:-]*/, '').trim();
        var pieces = cleanLine.split(/[-–—]/);
        if (pieces.length < 2) return null;

        var artistName = pieces[0].trim();
        var songName = pieces[1].trim();
        var airTime = pieces[2] ? pieces[2].trim() : "[Час не вказано]";

        return { artist: artistName, song: songName, time: airTime };
    }

    function copyToClipboard(btn, text) {
        navigator.clipboard.writeText(text).then(function() {
            var originalText = btn.innerText;
            btn.innerText = "Скопійовано!";
            btn.style.background = "#2ecc71";
            setTimeout(function() {
                btn.innerText = originalText;
                btn.style.background = "#34495e";
            }, 1500);
        });
    }

    function generateSongs() {
        var inputText = document.getElementById('songs-input').value.trim();
        var rotationType = document.querySelector('input[name="rotation"]:checked').value;
        var rawLines = inputText.split('\n');
        var lines = [];
        
        for (var i = 0; i < rawLines.length; i++) {
            var trimmed = rawLines[i].trim();
            if (trimmed !== "") {
                lines.push(trimmed);
            }
        }
        
        var outputContainer = document.getElementById('songs-output-list');
        outputContainer.innerHTML = "";
        parsedSongs = [];
if (lines.length < 2) {
            alert("Будь ласка, введіть дату в першому рядку та хоча б одну пісню у наступних.");
            return;
        }

        var commonDate = lines[0];
        var songLines = lines.slice(1);

        for (var j = 0; j < songLines.length; j++) {
            var currentLine = songLines[j];
            var data = parseSongLine(currentLine);
            var itemDiv = document.createElement('div');
            itemDiv.className = 'text-item';

            if (data) {
                parsedSongs.push(data);
                var text = "";
                
                if (rotationType === 'regular') {
                    text = "Вітаю. Вас турбує гостьова редакторка Радіо Промінь Вікторія Липовець.\n\nХочу повідомити, що пісня «" + data.artist + "» — «" + data.song + "» " + commonDate + " стартуватиме в ротації Радіо Промінь. Перший ефір відбудеться о «" + data.time + "».";
                } else {
                    var endDate = add6Days(commonDate);
                    text = "Вітаю. Вас турбує гостьова редакторка Радіо Промінь Вікторія Липовець. Хочу повідомити, що пісня «" + data.artist + "» — «" + data.song + "» завтра (" + commonDate + ") стартуватиме на Радіо Промінь в рубриці «Промінь рекомендує». Перший ефір буде завтра о «" + data.time + "». Гратиме щодня протягом тижня (до неділі, " + endDate + " включно) 1–2 рази на день в цій же рубриці в різний час, а потім переходить в загальну ротацію.";
                }
                
                itemDiv.innerHTML = '<div class="text-content">' + text + '</div>';
                
                (function(capturedText) {
                    var copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.innerText = 'Копіювати';
copyBtn.onclick = function() { copyToClipboard(copyBtn, capturedText); };
itemDiv.appendChild(copyBtn);
})(text);
} else {
itemDiv.className = 'text-item error-item';
itemDiv.innerHTML = '[Помилка розпізнавання рядка: "' + currentLine + '"]. Перевірте формат (Виконавець - Назва - Час).';
}
outputContainer.appendChild(itemDiv);
}
}
function generateLabels() {
var outputContainer = document.getElementById('labels-output-list');
outputContainer.innerHTML = "";
if (parsedSongs.length === 0) {
alert("Спочатку заповніть і згенеруйте список пісень на першій вкладці!");
return;
}
var labelsText = document.getElementById('labels-input').value.trim();
var rawLabels = labelsText.split('\n');
var labels = [];
for (var i = 0; i < rawLabels.length; i++) {
var trimmed = rawLabels[i].trim();
if (trimmed !== "") {
labels.push(trimmed);
}
}
for (var k = 0; k < parsedSongs.length; k++) {
var song = parsedSongs[k];
var itemDiv = document.createElement('div');
itemDiv.className = 'text-item';
if (k < labels.length) {
var text = "Вітаю. Вас турбує гостьова редакторка Радіо Промінь Вікторія Липовець.\n\nПовідомляємо, що трек «" + song.song + "» від виконавця «" + song.artist + "» успішно додано до ефірної сітки під лейблом «" + labels[k] + "». Дякуємо за співпрацю!";
itemDiv.innerHTML = '' + text + '';
(function(capturedText) {
var copyBtn = document.createElement('button');
copyBtn.className = 'copy-btn';
copyBtn.innerText = 'Копіювати';
copyBtn.onclick = function() { copyToClipboard(copyBtn, capturedText); };
itemDiv.appendChild(copyBtn);
})(text);
} else {
itemDiv.className = 'text-item error-item';
itemDiv.innerHTML = '[Немає лейбла для цієї пісні]. Додайте рядок у поле введення лейблів.';
}
outputContainer.appendChild(itemDiv);
}
}
